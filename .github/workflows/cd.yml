name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        env:
          PRIVATE_KEY: ${{ secrets.KEY }}
        run: |
          echo "$PRIVATE_KEY" > private_key
          chmod 600 private_key
          ssh -o StrictHostKeyChecking=no -i private_key -p ${{ secrets.PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} "
            if [ ! -d \"~/forum-api-v3\" ]; then
              git clone https://github.com/Neoline52/forum-api-v3.git ~/forum-api-v3
            fi
            cd ~/forum-api-v3
            git pull origin main
            npm install
            npm run migrate
            pm2 restart forum-api || pm2 start src/app.js --name \"forum-api\"
          "
