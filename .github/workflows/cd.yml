name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            if [ ! -d "~/forum-api-v3" ]; then
              git clone https://github.com/Neoline52/forum-api-v3.git ~/forum-api-v3
            fi
            cd ~/forum-api-v3
            git pull origin main
            npm install
            npm run migrate
            pm2 restart forum-api || pm2 start src/app.js --name "forum-api"
