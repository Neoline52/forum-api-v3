limit_req_zone $binary_remote_addr zone=one:10m rate=90r/m;

server {
    server_name late-planes-chew-daily.st.a.dcdg.xyz;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Syarat Dicoding: Batasi /threads dan path di dalamnya (Strict 90 req/min)
    location /threads {
        limit_req zone=one;
        limit_req_status 429;
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/late-planes-chew-daily.st.a.dcdg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/late-planes-chew-daily.st.a.dcdg.xyz/privkey.pem;
}

server {
    if ($host = late-planes-chew-daily.st.a.dcdg.xyz) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name late-planes-chew-daily.st.a.dcdg.xyz;
    return 404;
}
